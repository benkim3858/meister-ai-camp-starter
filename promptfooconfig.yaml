# promptfoo 시작 설정 — 2일차 평가 실습용
# 실행:  npx promptfoo@latest eval   →   npx promptfoo@latest view
# 키는 같은 폴더의 .env 파일에서 자동으로 읽습니다 (GOOGLE_API_KEY, GROQ_API_KEY)

prompts:
  - "{{system}}\n\n사용자: {{question}}"

# 비교할 모델 3단 (로컬 / 무료 클라우드 2종)
providers:
  - google:gemini-2.5-flash
  - groq:llama-3.1-8b-instant
  - ollama:chat:gemma3:4b

# 채점관(judge)을 flash로 고정 — 기본값(gemini-2.5-pro)은 무료 사용량을 빨리 소모함
defaultTest:
  options:
    provider: google:gemini-2.5-flash

tests:
  # ↓ 팀의 시스템 프롬프트와 대표 질문으로 교체하세요 (테스트를 늘려도 됩니다)
  - vars:
      system: "너는 친절한 AI 도우미다. 한국어로 3문장 이내로 답한다."
      question: "코딩 동아리는 언제 모여?"
    assert:
      # pass/fail 한 줄 루브릭부터 시작 (2일차 3교시에 만든 루브릭 사용)
      - type: llm-rubric
        value: "답변이 한국어이고 3문장 이내다"
